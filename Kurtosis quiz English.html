<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Kurtosis Quiz</title>
<style>
  :root{
    --bg:#0f172a; --panel:#0b1220; --muted:#94a3b8; --text:#e5e7eb;
    --ok:#22c55e; --err:#ef4444; --accent:#38bdf8;
  }
  body{margin:0;height:100%;display:flex;align-items:center;justify-content:center;
    font-family:ui-sans-serif,system-ui,Arial;background:radial-gradient(1200px 600px at 80% -10%, #1e293b 0%, #0b1020 45%, var(--bg) 100%);color:var(--text);padding:24px;}
  .wrap{width:min(900px,100%);}
  .card{background:linear-gradient(180deg,rgba(255,255,255,.04),transparent 60%),var(--panel);
    border:1px solid rgba(148,163,184,.15);border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,.35);overflow:hidden;}
  header{padding:16px 20px;display:flex;justify-content:space-between;align-items:center;
    border-bottom:1px solid rgba(148,163,184,.12);background:linear-gradient(180deg,rgba(56,189,248,.08),rgba(56,189,248,.02));}
  h1{margin:0;font-size:clamp(18px,2.5vw,22px);}
  #status{color:var(--muted);font-size:14px;}
  .content{padding:18px 20px;display:grid;gap:14px;}
  .canvas-wrap{border:1px solid rgba(56,189,248,.18);border-radius:14px;padding:10px;background:linear-gradient(180deg,rgba(34,197,94,.06),rgba(34,197,94,.02));}
  canvas{width:100%;height:420px;display:block;background:#0a0f1a;border-radius:10px;}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:13px;color:var(--muted);}
  .dot{width:10px;height:10px;border-radius:999px;display:inline-block;margin-right:6px;}
  .dot.hist{background:#64748b;}.dot.curve{background:#38bdf8;}
  .pill{padding:6px 10px;border-radius:999px;font-size:12px;border:1px solid rgba(148,163,184,.2);color:var(--muted);}
  .btnrow{display:flex;flex-wrap:wrap;gap:10px;}
  button{appearance:none;border:none;border-radius:999px;padding:10px 14px;font-weight:700;cursor:pointer;
    color:#0b1020;background:#e5e7eb;box-shadow:0 4px 14px rgba(0,0,0,.25);}
  button:hover{transform:translateY(-1px);}button:active{transform:translateY(0);}
  .primary{background:linear-gradient(180deg,#38bdf8,#0891b2);color:#fff;}
  .ghost{background:transparent;color:var(--muted);border:1px solid rgba(148,163,184,.25);}
  .controls{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
  .score{font-weight:800;color:#fff;}
  .answer-msg{font-weight:700;}
  .correct{color:var(--ok);} .wrong{color:var(--err);}
  .end{text-align:center;padding:16px;color:var(--muted);} .end h2{color:#fff;margin:.2rem 0 .6rem;}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <header>
      <h1>Kurtosis Quiz</h1>
      <div id="status">Question <span id="qnum">1</span> of <span id="qtotal">10</span></div>
    </header>
    <div class="content">
      <div class="canvas-wrap"><canvas id="plot" width="1000" height="460"></canvas></div>
      <div class="legend">
        <span class="pill">Task: Determine the <b>kurtosis</b> (platykurtic / mesokurtic / leptokurtic).</span>
        <span><span class="dot hist"></span>Histogram</span>
        <span><span class="dot curve"></span>Normal distribution (same μ &amp; σ)</span>
      </div>
      <div class="btnrow" role="group">
        <button class="opt" data-val="platy">Platykurtic</button>
        <button class="opt" data-val="meso">Mesokurtic</button>
        <button class="opt" data-val="lepto">Leptokurtic</button>
      </div>
      <div class="controls">
        <div class="btnrow">
          <button id="next" class="primary" disabled>Next</button>
          <button id="restart" class="ghost">Restart</button>
        </div>
        <div>Correct: <span class="score" id="score">0</span></div>
      </div>
      <div class="answer-msg" id="feedback">&nbsp;</div>
      <div class="end" id="end" hidden>
        <h2>Finished!</h2>
        <p>You got <b id="finalScore">0</b> out of <b id="totalQ">10</b> correct.</p>
        <button id="again" class="primary">Play Again</button>
      </div>
    </div>
  </div>
</div>
<script>
(function(){
  const rnd=Math.random, TAU=Math.PI*2;
  const canvas=document.getElementById('plot'), ctx=canvas.getContext('2d');
  const TOTAL=10; document.getElementById('qtotal').textContent=TOTAL;
  const qnumEl=document.getElementById('qnum'), scoreEl=document.getElementById('score');
  const feedbackEl=document.getElementById('feedback'), nextBtn=document.getElementById('next');
  const restartBtn=document.getElementById('restart'), againBtn=document.getElementById('again');
  const endPanel=document.getElementById('end'), finalScoreEl=document.getElementById('finalScore');
  const optBtns=Array.from(document.querySelectorAll('.opt'));

  const randn=(()=>{let spare,has=false;return function(){
    if(has){has=false;return spare;}
    let u=0,v=0;while(u===0)u=rnd();while(v===0)v=rnd();
    const m=Math.sqrt(-2*Math.log(u)),z0=m*Math.cos(TAU*v),z1=m*Math.sin(TAU*v);
    spare=z1;has=true;return z0;}})();

  function mean(a){return a.reduce((s,x)=>s+x,0)/a.length;}
  function std(a){const m=mean(a);return Math.sqrt(a.reduce((s,x)=>s+(x-m)**2,0)/(a.length-1));}

  function baseByKurtosis(kind,n){
    if(kind==='meso'){const o=[];for(let i=0;i<n;i++)o.push(randn());return o;}
    if(kind==='lepto'){const o=[];for(let i=0;i<n;i++){if(rnd()<0.08){const sign=rnd()<0.5?-1:1;o.push(sign*(3+Math.abs(randn())*2.5));}else{o.push(randn());}}return o;}
    const R=Math.sqrt(3),o=[];for(let i=0;i<n;i++)o.push((rnd()*2-1)*R);return o;
  }

  function finalizeData(arr){
    let m=mean(arr),s=std(arr)||1,z=arr.map(x=>(x-m)/s);
    const scale=0.7+rnd()*1.3,shift=(rnd()*4-2);
    z=z.map(x=>x*scale+shift);
    const m2=mean(z),s2=std(z)||1,lo=m2-5*s2,hi=m2+5*s2;
    return z.filter(v=>v>=lo&&v<=hi);
  }

  function histogram(data,bins=16){
    const lo=Math.min(...data),hi=Math.max(...data),pad=(hi-lo)*0.06||1;
    const min=lo-pad,max=hi+pad,w=(max-min)/bins,counts=new Array(bins).fill(0);
    data.forEach(x=>{let i=Math.floor((x-min)/w);if(i<0)i=0;if(i>=bins)i=bins-1;counts[i]++;});
    const edges=Array.from({length:bins+1},(_,i)=>min+i*w);
    return{counts,edges,min,max,width:w};
  }

  function normalPdf(x,mu,sigma){return (1/(sigma*Math.sqrt(2*Math.PI)))*Math.exp(-0.5*((x-mu)/sigma)**2);}
  function xScale(x,a,min,max){return a.x0+(x-min)*(a.x1-a.x0)/(max-min);}
  function yScale(y,a,maxY){const t=Math.max(0,Math.min(1,y/maxY));return a.y1-t*(a.y1-a.y0);}

  function draw(data){
    const margin={left:56,right:16,top:18,bottom:46};
    const area={x0:margin.left,y0:margin.top,x1:canvas.width-margin.right,y1:canvas.height-margin.bottom};
    const bins=histogram(data,16);const mu=mean(data),sigma=std(data)||1;
    const n=data.length,scaleTo=n*bins.width,maxHist=Math.max(...bins.counts);
    const curvePeak=normalPdf(mu,mu,sigma)*scaleTo,maxY=Math.max(maxHist,curvePeak)*1.15;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle='rgba(148,163,184,.35)';ctx.beginPath();
    ctx.moveTo(area.x0,area.y1);ctx.lineTo(area.x1,area.y1);
    ctx.moveTo(area.x0,area.y1);ctx.lineTo(area.x0,area.y0);ctx.stroke();
    ctx.fillStyle='#64748b';ctx.strokeStyle='#475569';
    bins.counts.forEach((c,i)=>{const xL=xScale(bins.edges[i],area,bins.min,bins.max);
      const xR=xScale(bins.edges[i+1],area,bins.min,bins.max)-1;
      const yTop=yScale(c,area,maxY),yB=area.y1,w=Math.max(1,xR-xL),h=Math.max(1,yB-yTop),r=Math.min(6,h,w/2);
      ctx.beginPath();ctx.moveTo(xL,yB);ctx.lineTo(xL,yTop+r);
      ctx.quadraticCurveTo(xL,yTop,xL+r,yTop);ctx.lineTo(xR-r,yTop);
      ctx.quadraticCurveTo(xR,yTop,xR,yTop+r);ctx.lineTo(xR,yB);ctx.closePath();ctx.fill();ctx.stroke();});
    ctx.strokeStyle='#38bdf8';ctx.lineWidth=2;ctx.beginPath();
    for(let i=0;i<400;i++){const t=i/399,xv=bins.min+t*(bins.max-bins.min);
      const yc=normalPdf(xv,mu,sigma)*scaleTo,x=xScale(xv,area,bins.min,bins.max),y=yScale(yc,area,maxY);
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}ctx.stroke();
  }

  let current=0,score=0,truth='meso',data=[];
  function label(k){return k==='platy'?'platykurtic':(k==='meso'?'mesokurtic':'leptokurtic');}
  function chooseKurt(){const r=rnd();if(r<1/3)return'platy';if(r<2/3)return'meso';return'lepto';}
  function newRound(){truth=chooseKurt();data=finalizeData(baseByKurtosis(truth,800));draw(data);}
  function resetGame(){current=0;score=0;scoreEl.textContent='0';qnumEl.textContent='1';feedbackEl.innerHTML='&nbsp;';
    endPanel.hidden=true;nextBtn.disabled=true;optBtns.forEach(b=>b.disabled=false);newRound();}
  function showEnd(){endPanel.hidden=false;finalScoreEl.textContent=score;}
  optBtns.forEach(b=>b.addEventListener('click',()=>{const guess=b.dataset.val;
    if(guess===truth){score++;scoreEl.textContent=score;feedbackEl.innerHTML=`<span class="correct">✔ Correct!</span> (${label(truth)})`;}
    else{feedbackEl.innerHTML=`<span class="wrong">✘ Wrong.</span> Correct answer: <b>${label(truth)}</b>`;}
    optBtns.forEach(x=>x.disabled=true);nextBtn.disabled=false;}));
  nextBtn.addEventListener('click',()=>{current++;if(current>=TOTAL){showEnd();return;}
    qnumEl.textContent=(current+1);nextBtn.disabled=true;feedbackEl.innerHTML='&nbsp;';optBtns.forEach(x=>x.disabled=false);newRound();});
  restartBtn.addEventListener('click',resetGame);againBtn?.addEventListener('click',resetGame);
  resetGame();
})();
</script>
</body>
</html>
